name: "Hermes Voice Assistant"
version: "0.0.2"
slug: "hermes_voice"
description: "Voice assistant bridge for Home Assistant — wake word → STT → Hermes LLM → TTS → media_player. Can run local-first with local engines."
url: "https://github.com/rusty4444/hermes-voice-ha-integration"
arch:
  - aarch64
  - amd64
hassio_api: true
homeassistant_api: true
ingress: true
ingress_port: 7860
panel_icon: "mdi:assistant"
panel_title: "Hermes"
init: false
startup: application
boot: manual
options:
  ha_url: "http://homeassistant.local:8123"
  hermes_api_token: ""
  hermes_llm_provider: "ollama"
  hermes_model: "qwen2.5:3b"
  hermes_llm_url: "http://ollama:11434/v1"
  stt_engine: "faster-whisper"
  stt_model: "tiny"
  tts_engine: "edge"
  tts_voice: "en-US-AriaNeural"
  wake_word: "computer"
  media_player_entity: ""
  log_level: "info"
schema:
  ha_url: str
  hermes_api_token: str
  hermes_llm_provider: list(ollama|vllm|llama.cpp|openai|custom)
  hermes_model: str
  hermes_llm_url: url
  stt_engine: list(faster-whisper|whisper-cpp|command)
  stt_model: list(tiny|base|small|medium|large-v3)
  tts_engine: list(edge|piper|command)
  tts_voice: str
  wake_word: str
  media_player_entity: str
  log_level: list(debug|info|warning|error)
ports:
  7860/tcp: 7860
ports_description:
  7860/tcp: "Hermes Web UI / API"
